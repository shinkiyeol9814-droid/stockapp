name: Stock High Price Batch (Telegram + Gemini)

on:
  # 기존 schedule은 지우거나 주석 처리하고 아래 내용을 추가합니다.
  repository_dispatch:
    types: [trigger_batch]  # 'trigger_batch'라는 이름의 신호를 받으면 실행함
  
  # 수동 실행 버튼은 유지
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # 💡 경고 해결: v3 -> v4로 업데이트
        with:
          ref: dev # 💡 핵심: 처음부터 아예 dev 브랜치를 기준으로 가져오도록 강제 세팅

      - name: Set up Python 3.10
        uses: actions/setup-python@v5 # 💡 경고 해결: v4 -> v5로 업데이트
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Batch Analysis Script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python batch_analysis.py

      - name: Commit and Push Results to dev
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/*.json
          git commit -m "Auto-update: Daily stock high price report & AI analysis" || echo "No changes to commit"
          git push origin HEAD:dev # 💡 에러 해결: 현재 상태를 무조건 dev로 밀어넣기
