name: Stock Analysis Batch (Telegram & Gemini)

on:
  schedule:
    - cron: '40 6 * * *'  # 한국시간 15:40
    - cron: '20 11 * * *' # 한국시간 20:20
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas FinanceDataReader telethon google-generativeai bs4 requests
      - name: Run Analysis Script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python batch_analysis.py
      - name: Commit and Push to dev branch
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/*.json
          git commit -m "Auto-update: Daily high stocks report" || echo "No changes to commit"
          git push origin dev
