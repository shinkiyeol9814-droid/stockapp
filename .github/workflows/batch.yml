name: Stock High Price Batch (Telegram + Gemini)

on:
  repository_dispatch:
    types: [trigger_batch]  
  # schedule:
  #   - cron: '40 6 * * 1-5'  
  #   - cron: '20 11 * * 1-5' 
  workflow_dispatch: 

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 
        with:
          # 💡 [해결 1] 'main'이나 'dev' 글자 대신 동적 변수 사용
          # 이제 어느 브랜치에서 실행하든 알아서 자기 브랜치를 물고 옵니다.
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 

      - name: Run Batch Analysis Script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python batch_analysis.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/
          git commit -m "Auto-update: Daily stock high price report & AI analysis" || echo "No changes to commit"
          
          # 💡 [해결 2] push와 pull에도 동적 변수 적용
          # main으로 머지되면 알아서 origin main으로 당기고 밉니다.
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
