name: Stock High Price Batch (Telegram + Gemini)

on:
  schedule:
    - cron: '40 6 * * 1-5'  # 월~금 한국시간 15:40 (정규장 종료 후)
    - cron: '20 11 * * 1-5' # 월~금 한국시간 20:20 (시간외 종료 후)
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas finance-datareader telethon google-generativeai beautifulsoup4 requests

      - name: Run Batch Analysis Script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python batch_analysis.py

      - name: Commit and Push Results to main
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/*.json
          git commit -m "Auto-update: Daily stock high price report & AI analysis" || echo "No changes to commit"
          git push origin main
