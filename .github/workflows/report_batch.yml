name: Broker Report Morning/Evening Batch

on:
  schedule:
    - cron: '10 23 * * *' # 한국 08:10 (전일 20시 이후분)
    - cron: '10 11 * * *' # 한국 20:10 (당일 08시 이후분)
  workflow_dispatch:

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          # ...기타 시크릿 설정
        run: python batch_report.py
