name: Earnings Screening Auto Batch

on:
  repository_dispatch:
    types: [run_earnings_batch] 
  workflow_dispatch:

# 💡 [핵심 추가] 두 개의 배치가 겹치지 않게 철벽 방어!
concurrency:
  group: "earnings-batch"
  cancel-in-progress: false # 돌고 있는 게 있으면 새 작업은 대기(skip)합니다.

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        env:
          # 💡 [포인트] 이 배치는 정규식을 쓰기 때문에 GEMINI_API_KEY가 필요 없습니다!
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python batch_earnings.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # 💡 실적 데이터 폴더만 콕 집어서 추가
          git add data/earnings/
          git commit -m "Auto-update: AWAKE Earnings data" || echo "No changes to commit"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
