name: Keep Streamlit App Awake

on:
  schedule:
    # 1시간 간격 실행 — 모바일 cold start 방지 (GitHub Actions 최소 간격)
    # 한국 시간(KST) 기준: 매 시각 정각 실행
    # UTC 기준: 매 시각 정각
    - cron: '0 * * * *'
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          # 본(Main) 서버 깨우기 — GET 요청으로 실제 앱 활성화
          curl -s -o /dev/null -L "https://stockapp-sky.streamlit.app/"

          # Dev(개발) 서버 깨우기
          curl -s -o /dev/null -L "https://stockapp-sky-dev.streamlit.app/"
