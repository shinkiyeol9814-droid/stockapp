name: Keep Streamlit App Awake

on:
  schedule:
    # 2시간 간격 실행 — 모바일 cold start 방지를 위해 빈도를 높임
    # 한국 시간(KST) 기준: 매 짝수 시각(00, 02, 04 ... 22시) 실행
    # UTC 기준: 매 짝수 시각
    - cron: '0 */2 * * *'
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          # 💡 본(Main) 서버 깨우기
          curl -I "https://stockapp-sky.streamlit.app/"
          
          # 💡 Dev(개발) 서버 깨우기 (아래 주소를 실제 Dev 주소로 변경하세요)
          curl -I "https://stockapp-sky-dev.streamlit.app/"
