name: Keep Streamlit App Awake

on:
  schedule:
    # 한국 시간(KST) 기준: 01:00, 07:00, 13:00, 19:00 실행
    # UTC 기준: 16:00, 22:00, 04:00, 10:00 (KST - 9시간)
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch: # 수동 실행 버튼 유지

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          # 💡 본인의 스트림릿 앱 주소로 변경하세요.
          curl -I "https://shinkiyeol9814-stockapp.streamlit.app"
